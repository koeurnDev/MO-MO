services:
  # 1. Backend (Telegram Bot)
  - type: web
    name: tg-mini-app-bot
    env: node
    plan: free
    rootDir: bot
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: SUPERADMIN_ID
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: DB_POOL_MAX
        value: "50"
      - key: DB_POOL_MIN
        value: "10"
      - key: REDIS_URL
        fromService:
          type: redis
          name: redis
          property: connectionString

  # 3. Redis (Job Queue & Cache)
  - type: redis
    name: redis
    plan: starter
    ipAllowList: [] # Required for internal access

  # 2. Frontend (Mini App WebApp)
  - type: web
    name: tg-mini-app-webapp
    env: static
    rootDir: webapp
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_URL
        sync: false
